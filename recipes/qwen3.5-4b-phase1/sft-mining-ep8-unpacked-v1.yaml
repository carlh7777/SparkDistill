# Mining SFT, 8-epoch unpacked convergence recipe — 673-row canonical pin (9485d593).
#
# Motivation (issue #85): the 0.42778 Blackwell frontier is the static-metric ceiling —
# its kernels never execute (exec_pass_rate 0.0). The current canonical mix is 673
# GPU-verified runnable scripts (vs the 17 rows the frontier recipe saw), and the
# student's exec failures are small boilerplate/API slips, so this recipe simply trains
# the same LoRA family longer (8 epochs, lr 5e-5 cosine) with the hybrid-attention
# linear_attn projections included, unpacked for exact cross-platform reproducibility
# (sample_packing off avoids the packed-varlen flash-attention requirement, so the run
# reproduces bit-honestly on any host including ones without flash kernels).
#
#   scripts/prepare_mining_sft.sh
#   scripts/train.sh recipes/qwen3.5-4b-phase1/sft-mining-ep8-unpacked-v1.yaml
#   scripts/eval.sh --checkpoint outputs/qwen3.5-4b-mining-ep8-unpacked-v1 --compare-frontier --repo-frontier
#
# Measured on RTX 5090 (Blackwell sm_120, consumer — hence no CC attestation; full
# retrain-verification applies): triton 0.5444 (+27.3% vs frontier, vector_add
# exec_pass+correct 1.0), gsm8k holds ≥ frontier. Train wall-clock ~1.8 h.

base_model: Qwen/Qwen3.5-4B
trust_remote_code: true

chat_template: qwen3_5
roles_to_train: ["assistant"]

datasets:
  - path: data/processed/sparkproof-mining_sft.jsonl
    type: chat_template
    field_messages: messages

dataset_prepared_path: data/prepared/qwen3.5-4b-mining-ep8-unpacked-v1
val_set_size: 0.05
output_dir: outputs/qwen3.5-4b-mining-ep8-unpacked-v1

sequence_len: 4096
sample_packing: false
pad_to_sequence_len: false

adapter: lora
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
  - linear_attn.in_proj_qkv
  - linear_attn.out_proj
  - linear_attn.in_proj_z
  - linear_attn.in_proj_a
  - linear_attn.in_proj_b

gradient_accumulation_steps: 16
micro_batch_size: 1
num_epochs: 8
optimizer: adamw_torch
lr_scheduler: cosine
learning_rate: 5.0e-5
warmup_ratio: 0.05
weight_decay: 0.0
seed: 42

bf16: true
tf32: true
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
attn_implementation: sdpa

evals_per_epoch: 1
saves_per_epoch: 1
save_total_limit: 2
logging_steps: 5
